name: Stage 2 DevOps Full CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

# =====================================================
# 1. LINT STAGE
# =====================================================
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Lint Python
        run: flake8 api/ worker/

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Lint JavaScript
        working-directory: frontend
        run: npx eslint .

      - name: Install hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

# =====================================================
# 2. TEST STAGE
# =====================================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest api/tests/ \
            --cov=api \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: .

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

# =====================================================
# 3. BUILD STAGE
# =====================================================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate SHA tags
        id: sha
        run: |
          echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "full=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Wait for registry
        run: |
          for i in {1..10}; do
            curl -s http://localhost:5000/v2/ && break
            sleep 2
          done

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ steps.sha.outputs.short }} ./api
          docker tag localhost:5000/api:${{ steps.sha.outputs.short }} localhost:5000/api:latest

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ steps.sha.outputs.short }} ./worker
          docker tag localhost:5000/worker:${{ steps.sha.outputs.short }} localhost:5000/worker:latest

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ steps.sha.outputs.short }} ./frontend
          docker tag localhost:5000/frontend:${{ steps.sha.outputs.short }} localhost:5000/frontend:latest

      - name: Push API image
        run: |
          docker push localhost:5000/api:${{ steps.sha.outputs.short }}
          docker push localhost:5000/api:latest

      - name: Push Worker image
        run: |
          docker push localhost:5000/worker:${{ steps.sha.outputs.short }}
          docker push localhost:5000/worker:latest

      - name: Push Frontend image
        run: |
          docker push localhost:5000/frontend:${{ steps.sha.outputs.short }}
          docker push localhost:5000/frontend:latest

# =====================================================
# 4. SECURITY STAGE
# =====================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images into local daemon for scanning
        run: |
          docker buildx build --load -t api:scan ./api
          docker buildx build --load -t worker:scan ./worker
          docker buildx build --load -t frontend:scan ./frontend

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan API image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-api.sarif \
            api:scan

      - name: Scan worker image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-worker.sarif \
            worker:scan

      - name: Scan frontend image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output trivy-frontend.sarif \
            frontend:scan

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

# =====================================================
# 5. INTEGRATION TEST STAGE
# =====================================================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..20}; do
            curl -f http://localhost:8000/health && break
            sleep 3
          done

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job status
        run: |
          for i in {1..15}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')

            if [[ "$STATUS" == *"complete"* ]]; then
              echo "Job completed"
              exit 0
            fi

            sleep 3
          done

          echo "Job failed"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down

# =====================================================
# 6. DEPLOY STAGE
# =====================================================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deployment
        run: |
          docker compose up -d --no-deps --build api

          for i in {1..12}; do
            if curl -f http://localhost:8000/health; then
              echo "Deployment successful"
              exit 0
            fi
            sleep 5
          done

          echo "Deployment failed - rollback assumed"
          exit 1